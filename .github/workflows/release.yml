name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  # Keep archive timestamps and tool output independent of the runner locale.
  TZ: UTC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate semantic version tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Tag must be SemVer, for example v0.8.0-alpha.1 or v0.8.0"
            exit 1
          fi

      - name: Require a commit from main
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          TAG_COMMIT=$(git rev-list -n 1 "${GITHUB_REF_NAME}")
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "Release tags must point to a commit already merged into main."
            exit 1
          fi

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Download and verify modules
        run: |
          go mod download
          go mod verify

      - name: Verify release source
        run: make verify

  build:
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Add Windows application metadata
        if: matrix.goos == 'windows'
        env:
          TARGET_ARCH: ${{ matrix.goarch }}
        run: |
          go tool go-winres make \
            --arch "${TARGET_ARCH}" \
            --out rsrc \
            --file-version git-tag \
            --product-version git-tag

      - name: Build executable
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short=12 HEAD)
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p dist

          BIN=omnideck
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN=omnideck.exe
          fi

          # Keep Go build/symbol metadata for transparency and malware-analysis
          # tooling. -trimpath removes runner-specific filesystem paths.
          go build -trimpath -buildvcs=true -ldflags "${LDFLAGS}" -o "dist/${BIN}" .
          touch -d "@${SOURCE_DATE_EPOCH}" "dist/${BIN}"
          sha256sum "dist/${BIN}"
          go version -m "dist/${BIN}"

      - name: Generate executable SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: dist/${{ matrix.goos == 'windows' && 'omnideck.exe' || 'omnideck' }}
          syft-version: v1.49.0
          format: spdx-json
          output-file: dist/omnideck-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest executable provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/${{ matrix.goos == 'windows' && 'omnideck.exe' || 'omnideck' }}

      - name: Attest executable SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/${{ matrix.goos == 'windows' && 'omnideck.exe' || 'omnideck' }}
          sbom-path: dist/omnideck-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json

      - name: Create archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          BIN=omnideck
          if [ "${GOOS}" = "windows" ]; then
            BIN=omnideck.exe
          fi

          ARCHIVE=omnideck-${GOOS}-${GOARCH}
          if [ "${GOOS}" = "windows" ]; then
            (cd dist && zip -X -q "${ARCHIVE}.zip" "${BIN}")
          else
            chmod +x "dist/${BIN}"
            tar --sort=name \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              --owner=0 --group=0 --numeric-owner \
              -cf - -C dist "${BIN}" | gzip -n > "dist/${ARCHIVE}.tar.gz"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: omnideck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/omnideck-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    environment: release
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: find . -maxdepth 1 -type f -name 'omnideck-*' -printf '%f\n' | LC_ALL=C sort | xargs sha256sum > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
