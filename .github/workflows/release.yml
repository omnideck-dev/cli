name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p dist

          # Windows binaries need a .exe extension.
          BIN=omnideck
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN=omnideck.exe
          fi

          go build -ldflags "${LDFLAGS}" -o "dist/${BIN}" .

          # Package: zip for Windows, tar.gz for everything else.
          ARCHIVE=omnideck-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip "${ARCHIVE}.zip" "${BIN}")
          else
            chmod +x "dist/${BIN}"
            tar -czf "dist/${ARCHIVE}.tar.gz" -C dist "${BIN}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/omnideck-${{ matrix.goos }}-${{ matrix.goarch }}.*
