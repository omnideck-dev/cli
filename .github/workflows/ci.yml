name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Unit tests + vet on all platforms ──────────────────────────
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            label: linux/amd64
          - runs-on: ubuntu-24.04-arm
            label: linux/arm64
          - runs-on: macos-13
            label: darwin/amd64
          - runs-on: macos-latest
            label: darwin/arm64
          - runs-on: windows-latest
            label: windows/amd64

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: go build -o /dev/null .
